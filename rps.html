<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tool-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 40px;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: slideUp 0.8s ease;
            text-align: center;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .game-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 40px 0;
            flex-wrap: wrap;
            gap: 20px;
        }

        .player-area, .computer-area {
            flex: 1;
            min-width: 150px;
        }

        .choice-display {
            font-size: 80px;
            margin: 20px 0;
            animation: pulse 0.6s ease;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .vs {
            font-size: 36px;
            color: #38bdf8;
            font-weight: bold;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .choices {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .choice-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 36px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .choice-btn:hover {
            transform: scale(1.1);
            border-color: #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        }

        .choice-btn.selected {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.2);
        }

        .result {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
            min-height: 30px;
        }

        .score {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }

        .score-item {
            text-align: center;
        }

        .score-number {
            font-size: 32px;
            font-weight: bold;
            color: #38bdf8;
        }

        .score-label {
            font-size: 14px;
            color: #94a3b8;
        }

        .btn {
            padding: 15px 30px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #38bdf8;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #38bdf8;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 600px) {
            .tool-container {
                width: calc(100% - 40px);
                padding: 25px 15px;
                margin: 30px 15px;
            }

            .game-area {
                flex-direction: column;
                gap: 30px;
            }

            .choice-display {
                font-size: 60px;
            }

            .vs {
                font-size: 28px;
            }

            .choices {
                gap: 10px;
            }

            .choice-btn {
                width: 70px;
                height: 70px;
                font-size: 28px;
            }

            .score {
                flex-direction: column;
                gap: 15px;
            }

            .btn {
                width: 100%;
                max-width: 250px;
                margin: 8px 4px;
                font-size: 18px;
                min-height: 50px;
            }

            nav {
                flex-direction: column;
                gap: 10px;
                padding: 12px;
            }

            nav > div {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <h2>⚡ MultiTool</h2>
        <div>
            <a href="index.html">Home</a>
            <a href="#">Tools</a>
            <a href="#">About</a>
        </div>
    </nav>

    <div class="tool-container">
        <h1>✂️ Rock Paper Scissors</h1>
        <p class="subtitle">Challenge the computer in this classic game!</p>

        <div class="game-area">
            <div class="player-area">
                <h3>You</h3>
                <div class="choice-display" id="playerChoice">❓</div>
            </div>

            <div class="vs">VS</div>

            <div class="computer-area">
                <h3>Computer</h3>
                <div class="choice-display" id="computerChoice">❓</div>
            </div>
        </div>

        <div class="choices">
            <button class="choice-btn" onclick="makeChoice('rock')">🪨</button>
            <button class="choice-btn" onclick="makeChoice('paper')">📄</button>
            <button class="choice-btn" onclick="makeChoice('scissors')">✂️</button>
        </div>

        <div class="result" id="result">Make your choice!</div>

        <div class="score">
            <div class="score-item">
                <div class="score-number" id="playerScore">0</div>
                <div class="score-label">Your Wins</div>
            </div>
            <div class="score-item">
                <div class="score-number" id="computerScore">0</div>
                <div class="score-label">Computer Wins</div>
            </div>
            <div class="score-item">
                <div class="score-number" id="ties">0</div>
                <div class="score-label">Ties</div>
            </div>
        </div>

        <button class="btn btn-secondary" onclick="resetGame()">🔄 Reset Game</button>

        <br><br>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        let playerScore = 0;
        let computerScore = 0;
        let ties = 0;

        const choices = {
            rock: '🪨',
            paper: '📄',
            scissors: '✂️'
        };

        function makeChoice(playerSelection) {
            // Show player's choice
            document.getElementById("playerChoice").textContent = choices[playerSelection];

            // Computer makes random choice
            const computerOptions = Object.keys(choices);
            const computerSelection = computerOptions[Math.floor(Math.random() * computerOptions.length)];
            document.getElementById("computerChoice").textContent = choices[computerSelection];

            // Determine winner
            const result = getWinner(playerSelection, computerSelection);
            document.getElementById("result").textContent = result;

            updateScore();
        }

        function getWinner(player, computer) {
            if (player === computer) {
                ties++;
                return "It's a tie! 🤝";
            }

            if (
                (player === 'rock' && computer === 'scissors') ||
                (player === 'paper' && computer === 'rock') ||
                (player === 'scissors' && computer === 'paper')
            ) {
                playerScore++;
                return "You win! 🎉";
            } else {
                computerScore++;
                return "Computer wins! 🤖";
            }
        }

        function updateScore() {
            document.getElementById("playerScore").textContent = playerScore;
            document.getElementById("computerScore").textContent = computerScore;
            document.getElementById("ties").textContent = ties;
        }

        function resetGame() {
            playerScore = 0;
            computerScore = 0;
            ties = 0;
            updateScore();
            document.getElementById("playerChoice").textContent = "❓";
            document.getElementById("computerChoice").textContent = "❓";
            document.getElementById("result").textContent = "Make your choice!";
        }
    </script>

    <footer>
        <p>Made by me 😎 | More tools coming soon</p>
    </footer>

</body>
</html>
