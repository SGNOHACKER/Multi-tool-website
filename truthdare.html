<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ToolDash - Truth or Dare</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Tool page styles */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .tool-page {
            min-height: 100vh;
            background: var(--bg-gradient, radial-gradient(circle at top, #0f172a, #000));
        }

        .tool-nav {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tool-nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .tool-nav .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 600;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .tool-main {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .tool-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .tool-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tool-subtitle {
            color: #94a3b8;
            font-size: 1.125rem;
        }

        /* Button consistency */
        button {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-family: 'Inter', sans-serif;
        }

        .truth, .dare, .next {
            padding: 15px 25px;
            margin: 10px;
            font-size: 18px;
        }

        .truth {
            background: #38bdf8;
            color: white;
        }

        .dare {
            background: #f43f5e;
            color: white;
        }

        .next {
            background: #22c55e;
            color: white;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* Tool footer */
        .tool-footer {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px 0;
            margin-top: 60px;
        }

        .tool-footer-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.875rem;
        }
        /* Override body padding for this page since tool container handles it */
        body {
            padding: 20px 10px;
        }

        h1 {
            margin-bottom: 20px;
        }

        /* CARD */
        .card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* BUTTONS */
        button {
            padding: 15px 25px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .truth {
            background: #38bdf8;
        }

        .dare {
            background: #f43f5e;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px white;
        }

        /* RESULT BOX */
        #result {
            margin-top: 20px;
            font-size: 20px;
            min-height: 50px;
            animation: fadeText 0.5s ease;
        }

        @keyframes fadeText {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* NEXT BUTTON */
        .next {
            background: #22c55e;
            margin-top: 15px;
        }

        /* MOBILE */
        @media (max-width: 600px) {
            .card {
                width: calc(100% - 40px);
                padding: 25px 15px;
                margin: 0 15px;
            }

            button {
                width: 100%;
                max-width: 200px;
                font-size: 18px;
                min-height: 55px;
                margin: 10px 5px;
                padding: 18px 25px;
            }

            h1 {
                font-size: 26px;
            }

            #result {
                font-size: 18px;
                padding: 15px;
            }
        }
    </style>
</head>

<body>

    <div class="tool-page">
        <!-- Tool Navigation -->
        <nav class="tool-nav">
            <div class="tool-nav-content">
                <div class="logo">
                    <span class="logo-icon">⚡</span>
                    <span class="logo-text">ToolDash</span>
                </div>
                <a href="index.html" class="back-btn">← Back to Dashboard</a>
            </div>
        </nav>

        <!-- Tool Content -->
        <main class="tool-main">
            <header class="tool-header">
                <h1 class="tool-title">🎮 Truth or Dare</h1>
                <p class="tool-subtitle">Classic party game for endless fun</p>
            </header>

            <div class="card">
                <button class="truth" onclick="getTruth()">Truth</button>
                <button class="dare" onclick="getDare()">Dare</button>

                <p id="result">Click Truth or Dare 😎</p>

                <button class="next" onclick="next()">Next ➡️</button>
            </div>

    <footer>
        <p>Made by me 😎 | More tools coming soon</p>
    </footer>

    <script>
        let truths = [
            "Tumne last time kab jhoot bola?",
            "Kisi par crush hai?",
            "Sabse embarrassing moment kya tha?",
            "Kya tumne kabhi cheating ki hai?",
            "Kiska secret tum jaante ho?",
            "What is the most embarrassing thing you’ve ever done on a date","If you could trade lives with anyone for a day who would it be","What is your biggest fear that you haven’t told anyone","What is the last lie you told to someone in this room","If you found a suitcase full of money what would you do","What is the most childish thing you still do","Who is your secret crush that no one knows about","What is the most expensive thing you have ever stolen","If you could be invisible for a day what would you do","What is the weirdest habit you have when you are alone","What is one thing you wish you could change about yourself","Have you ever ghosted someone and why","What is the most trouble you have ever been in at school or work","What is the most ridiculous reason you have ever broken up with someone","What is your biggest regret in life so far","If you could only eat one food for the rest of your life what would it be","What is the most awkward social situation you have ever been in","What is a secret you kept from your parents growing up","What is the meanest thing you have ever said to someone’s face","If you were stranded on a desert island who is the one person you would want with you","What is the most money you have ever spent on something useless","What is your biggest pet peeve","Have you ever snooped through someone else’s phone","What is the most embarrassing song on your playlist","What is your most unpopular opinion","If you could go back in time and change one thing what would it be","What is the first thing you would do if you won the lottery","What is the most illegal thing you have ever done","Who in this room do you think is the best looking","What is the longest you have gone without showering","What is your biggest insecurity","Have you ever pretended to be sick to get out of something","What is the most embarrassing thing your parents have caught you doing","If you had to marry one person in this room who would it be","What is a dream you have never told anyone","What is the most attractive quality a person can have","Have you ever cried during a movie and which one","What is the most cringe-worthy thing you have posted on social media","If you could meet any historical figure who would it be","What is the worst gift you have ever received","What is the most daring thing you have ever done","What is the one thing you can’t live without","Have you ever lied on your resume","What is the most annoying thing about the person to your left","If you could have any superpower what would it be","What is the most embarrassing nickname you have ever had","Have you ever cheated on a test","What is the last thing you searched for on your phone","What is the most spontaneous thing you have ever done","If you were a ghost who would you haunt first"
        ];

        let dares = [
            "10 pushups karo 💪",
            "Ek funny face bana ke photo bhejo 😂",
            "1 minute dance karo 💃",
            "Apne dost ko random call karo 📞",
            "Apna last message loud padh ke sunao 📱",
            "Do 10 pushups","Do 12 handstands","Eat a spoonful of hot sauce","Call a random contact and sing Happy Birthday","Text your crush I have a secret to tell you","Try to lick your elbow","Do your best chicken dance in the middle of the room","Let someone else post a status on your Facebook","Talk in an accent for the next 3 rounds","Drink a glass of water without using your hands","Do 20 jumping jacks","Try to touch your nose with your tongue","Wear your socks on your hands for the next 10 minutes","Mime what you did this morning","Balance a spoon on your nose for 30 seconds","Do a fashion walk across the room","Sing everything you say for the next 5 minutes","Try to juggle three random objects","Spin around 10 times and try to walk in a straight line","Draw a face on your hand and use it as a puppet","Do a plank for one minute","Tell a joke until someone laughs","Wear your clothes inside out","Try to whistle with crackers in your mouth","Do 15 squats","Stare at the person to your right without blinking for a minute","Bark like a dog every time someone says the","Let someone redo your hair","Pretend you are a cat for two minutes","Give a 2-minute speech on why pineapples belong on pizza","Dance with no music for one minute","Try to stand on one leg for two minutes","Make up a short rap about the person sitting next to you","Put as many marshmallows in your mouth as you can","Exchange a piece of clothing with the person to your left","Try to peel a banana with your feet","Act like a robot until your next turn","Do 5 burpees","Let the group look through your photo gallery for 30 seconds","Crawl across the floor like a baby","Repeat everything the person next to you says","Try to balance a book on your head while walking","Make a funny face and keep it for two minutes","Do 30 mountain climbers","Whisper everything you say for the next three turns","Impersonate a celebrity until someone guesses who it is","Do a bridge and hold it for 20 seconds","Try to make everyone in the room laugh in under a minute","Pretend to be a waiter and take everyone's snack order","Hold a mouthful of water while others try to make you laugh"
        ];

        let lastType = "";

        function getTruth() {
            let random = Math.floor(Math.random() * truths.length);
            document.getElementById("result").innerText = truths[random];
            lastType = "truth";
        }

        function getDare() {
            let random = Math.floor(Math.random() * dares.length);
            document.getElementById("result").innerText = dares[random];
            lastType = "dare";
        }

        function next() {
            if (lastType === "truth") {
                getTruth();
            } else if (lastType === "dare") {
                getDare();
            }
        }
    </script>
        </main>

        <!-- Tool Footer -->
        <footer class="tool-footer">
            <div class="tool-footer-content">
                <p>Built with ❤️ by SG SURYAN</p>
            </div>
        </footer>
    </div>

</body>
</html>
