<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Random Number Generator</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tool-container {
            max-width: 500px;
            margin: 60px auto;
            padding: 40px;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .input-group {
            margin: 20px 0;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: #94a3b8;
        }

        .input-row {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .input-group input {
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 18px;
            width: 100%;
            text-align: center;
        }

        .result-box {
            margin: 30px 0;
            padding: 30px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: #38bdf8;
            animation: bounceIn 0.6s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .btn {
            padding: 15px 30px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #38bdf8;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #38bdf8;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 600px) {
            .tool-container {
                width: calc(100% - 40px);
                padding: 25px 15px;
                margin: 30px 15px;
            }

            .input-row {
                flex-direction: column;
                gap: 10px;
            }

            .input-group input {
                width: 100%;
                font-size: 20px;
                padding: 12px;
            }

            .btn {
                width: 100%;
                max-width: 250px;
                margin: 8px 4px;
                font-size: 18px;
                min-height: 50px;
            }

            .result-box {
                font-size: 36px;
                padding: 20px;
            }

            nav {
                flex-direction: column;
                gap: 10px;
                padding: 12px;
            }

            nav > div {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <h2>⚡ MultiTool</h2>
        <div>
            <a href="index.html">Home</a>
            <a href="#">Tools</a>
            <a href="#">About</a>
        </div>
    </nav>

    <div class="tool-container">
        <h1>🎲 Random Number Generator</h1>
        <p class="subtitle">Generate random numbers for games, decisions, or fun!</p>

        <div class="input-row">
            <div class="input-group">
                <label>Minimum</label>
                <input type="number" id="min" value="1">
            </div>
            <div class="input-group">
                <label>Maximum</label>
                <input type="number" id="max" value="100">
            </div>
        </div>

        <button class="btn btn-primary" onclick="generateRandom()">🎲 Generate Random Number</button>

        <div class="result-box" id="result">
            Click to generate!
        </div>

        <button class="btn btn-primary" onclick="generateRandom()">🎯 Generate Again</button>

        <br><br>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        function generateRandom() {
            let min = parseInt(document.getElementById("min").value);
            let max = parseInt(document.getElementById("max").value);

            if (isNaN(min) || isNaN(max) || min >= max) {
                alert("Please enter valid numbers! Minimum should be less than maximum.");
                return;
            }

            let random = Math.floor(Math.random() * (max - min + 1)) + min;
            document.getElementById("result").innerText = random;
        }
    </script>

    <footer>
        <p>Made by me 😎 | More tools coming soon</p>
    </footer>

</body>
</html>
