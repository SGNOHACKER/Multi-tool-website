<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ToolDash - Coin Flip</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Tool page styles */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .tool-page {
            min-height: 100vh;
            background: var(--bg-gradient, radial-gradient(circle at top, #0f172a, #000));
        }

        .tool-nav {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tool-nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .tool-nav .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 600;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .tool-main {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .tool-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .tool-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tool-subtitle {
            color: #94a3b8;
            font-size: 1.125rem;
        }

        /* Button consistency */
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(56, 189, 248, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Tool footer */
        .tool-footer {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px 0;
            margin-top: 60px;
        }

        .tool-footer-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.875rem;
        }
        .tool-container {
            max-width: 500px;
            margin: 60px auto;
            padding: 40px;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: slideUp 0.8s ease;
            text-align: center;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .coin-container {
            margin: 40px 0;
            perspective: 1000px;
        }

        .coin {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: 5px solid #B8860B;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            font-weight: bold;
            color: #000;
            margin: 0 auto;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            animation: float 3s ease-in-out infinite;
        }

        .coin.flipping {
            animation: flip 1s ease-in-out;
        }

        @keyframes flip {
            0% { transform: rotateY(0deg); }
            25% { transform: rotateY(90deg); }
            50% { transform: rotateY(180deg); }
            75% { transform: rotateY(270deg); }
            100% { transform: rotateY(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .result {
            font-size: 24px;
            color: #38bdf8;
            margin: 20px 0;
            font-weight: bold;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #FFD700;
        }

        .stat-label {
            font-size: 14px;
            color: #94a3b8;
        }

        .btn {
            padding: 15px 30px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #38bdf8;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #38bdf8;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 600px) {
            .tool-container {
                width: calc(100% - 40px);
                padding: 25px 15px;
                margin: 30px 15px;
            }

            .coin {
                width: 120px;
                height: 120px;
                font-size: 48px;
            }

            .stats {
                flex-direction: column;
                gap: 15px;
            }

            .btn {
                width: 100%;
                max-width: 250px;
                margin: 8px 4px;
                font-size: 18px;
                min-height: 50px;
            }

            nav {
                flex-direction: column;
                gap: 10px;
                padding: 12px;
            }

            nav > div {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <h2>⚡ MultiTool</h2>
        <div>
            <a href="index.html">Home</a>
            <a href="#">Tools</a>
            <a href="#">About</a>
        </div>
    </nav>

    <div class="tool-page">
        <!-- Tool Navigation -->
        <nav class="tool-nav">
            <div class="tool-nav-content">
                <div class="logo">
                    <span class="logo-icon">⚡</span>
                    <span class="logo-text">ToolDash</span>
                </div>
                <a href="index.html" class="back-btn">← Back to Dashboard</a>
            </div>
        </nav>

        <!-- Tool Content -->
        <main class="tool-main">
            <header class="tool-header">
                <h1 class="tool-title">🪙 Coin Flip</h1>
                <p class="tool-subtitle">Flip a coin to make decisions or just for fun!</p>
            </header>

            <div class="tool-container">

        <div class="coin-container">
            <div class="coin" id="coin">🪙</div>
        </div>

        <div class="result" id="result">Click to flip!</div>

        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="heads">0</div>
                <div class="stat-label">Heads</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="tails">0</div>
                <div class="stat-label">Tails</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="total">0</div>
                <div class="stat-label">Total Flips</div>
            </div>
        </div>

        <button class="btn btn-primary" onclick="flipCoin()">🪙 Flip Coin</button>
        <button class="btn btn-secondary" onclick="resetStats()">🔄 Reset Stats</button>

        <br><br>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        let headsCount = 0;
        let tailsCount = 0;

        function flipCoin() {
            const coin = document.getElementById("coin");
            const result = document.getElementById("result");

            // Add flipping animation
            coin.classList.add("flipping");

            // Remove animation after it completes
            setTimeout(() => {
                coin.classList.remove("flipping");

                // Generate random result
                const isHeads = Math.random() < 0.5;

                if (isHeads) {
                    coin.textContent = "🪙";
                    result.textContent = "Heads!";
                    headsCount++;
                } else {
                    coin.textContent = "🪙";
                    result.textContent = "Tails!";
                    tailsCount++;
                }

                updateStats();
            }, 600);
        }

        function updateStats() {
            document.getElementById("heads").textContent = headsCount;
            document.getElementById("tails").textContent = tailsCount;
            document.getElementById("total").textContent = headsCount + tailsCount;
        }

        function resetStats() {
            headsCount = 0;
            tailsCount = 0;
            updateStats();
            document.getElementById("result").textContent = "Click to flip!";
        }
    </script>
            </div>
        </main>

        <!-- Tool Footer -->
        <footer class="tool-footer">
            <div class="tool-footer-content">
                <p>Built with ❤️ by SG SURYAN</p>
            </div>
        </footer>
    </div>

</body>
</html>
