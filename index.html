<!DOCTYPE html>
<html>
<head>
    <title>My Tools Website</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <h2>⚡ MultiTool</h2>
        <div>
            <a href="#">Home</a>
            <a href="#">Tools</a>
            <a href="#">About</a>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <section class="hero">
        <h1>All-in-One Free Tools 🚀</h1>
        <p>Simple, fast & useful tools made by me</p>
    </section>

    <!-- TOOLS -->
    <div class="container">
        <a href="password.html">
  <div class="box">🔐 Password Generator</div>
</a>

        <div class="box" onclick="openPage('quiz.html')">
            🧠 Quiz App
        </div>

        <div class="box" onclick="openPage('truthdare.html')">
            🎮 Truth or Dare
        </div>
    </div>

    <script>
        function openPage(page) {
    window.location.href = page + "?v=" + Date.now();
}

    document.querySelectorAll(".box").forEach(box => {
  box.addEventListener("click", function(e) {
    let circle = document.createElement("span");
    circle.classList.add("ripple");

    this.appendChild(circle);

    let x = e.clientX - this.offsetLeft;
    let y = e.clientY - this.offsetTop;

    circle.style.left = x + "px";
    circle.style.top = y + "px";

    setTimeout(() => {
      circle.remove();
    }, 500);
  });
});

    </script>

    <footer>
        <p>Made by me 😎 | More tools coming soon</p>
    </footer>

</body>
</html>
