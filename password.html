<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tool-container {
            max-width: 500px;
            margin: 60px auto;
            padding: 40px;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .input-group {
            margin: 20px 0;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: #94a3b8;
        }

        .input-group input {
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 18px;
            width: 100px;
            text-align: center;
        }

        .result-box {
            margin: 30px 0;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-box h3 {
            margin: 0;
            color: white;
            font-size: 24px;
            word-break: break-all;
        }

        .btn {
            padding: 15px 30px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #38bdf8;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #38bdf8;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 600px) {
            .tool-container {
                width: calc(100% - 40px);
                padding: 25px 15px;
                margin: 30px 15px;
            }

            .input-group input {
                width: 80%;
                font-size: 20px;
                padding: 12px;
            }

            .btn {
                width: 100%;
                max-width: 250px;
                margin: 8px 4px;
                font-size: 18px;
                min-height: 50px;
            }

            .result-box h3 {
                font-size: 18px;
            }

            nav {
                flex-direction: column;
                gap: 10px;
                padding: 12px;
            }

            nav > div {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .hero h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <h2>⚡ MultiTool</h2>
        <div>
            <a href="index.html">Home</a>
            <a href="#">Tools</a>
            <a href="#">About</a>
        </div>
    </nav>

    <div class="tool-container">
        <h1>🔐 Password Generator</h1>
        <p class="subtitle">Generate secure passwords instantly</p>
        
        <div class="input-group">
            <label>Enter Password Length</label>
            <input type="number" id="length" value="12" min="4" max="50">
        </div>
        
        <button class="btn btn-primary" onclick="generatePassword()">Generate Password</button>
        
        <div class="result-box">
            <h3 id="result">Your password will appear here</h3>
        </div>
        
        <button class="btn btn-secondary" onclick="copyPassword()">📋 Copy to Clipboard</button>
        
        <br><br>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>
  
    <script>
        function generatePassword() {
            let length = document.getElementById("length").value;

            let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:,.<>?";

            let password = "";

            for (let i = 0; i < length; i++) {
                let randomIndex = Math.floor(Math.random() * chars.length);
                password += chars[randomIndex];
            }

            document.getElementById("result").innerText = password;
        }

        function copyPassword() {
            let password = document.getElementById("result").innerText;

            if (password === "" || password === "Your password will appear here") {
                alert("Generate a password first!");
                return;
            }

            navigator.clipboard.writeText(password);
            alert("✅ Password copied to clipboard!");
        }
    </script>

    <footer>
        <p>Made by me 😎 | More tools coming soon</p>
    </footer>

</body>
</html>
